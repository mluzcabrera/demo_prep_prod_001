apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: Build and test
on:
  workflow_dispatch:
permissions:
  scm-token-own: read
  scm-token-org: read
  id-token: write
jobs:
  build:
    steps:
      - name: checkout-source-code
        uses: cloudbees-io/checkout@v2
      - name: Build
        id: build
        uses: docker://golang:1.20.3-alpine3.17
        shell: sh
        run: |
          # Create a hash based on current time & random data
          hash=$(date +%s%N | sha256sum | awk '{print $1}')
          echo "Generated hash: $hash"
          # Make it available to other steps
          echo "$hash" >> $CLOUDBEES_OUTPUTS/hash
      - name: Publish tests
        uses: cloudbees-io/publish-test-results@v2
        with:
          test-type: go
          results-path: ${{ cloudbees.workspace }}/test_data/go/report.xml
      - name: Register build artifact
        id: publish-build-1
        uses: cloudbees-io/register-build-artifact@v1
        with:
          version: ${{cloudbees.version}}
          url: 476449643511.dkr.ecr.eu-north-1.amazonaws.com/mlcb/demo-artifact:${{cloudbees.version}}
          name: demo-artifact:${{cloudbees.version}}